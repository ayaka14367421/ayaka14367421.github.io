
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="新幹線ウォッチャー">
  <title>🌸 上熊本 新幹線ウォッチャー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: #fff5f8;
      min-height: 100vh;
      padding: 1.5rem 1rem 3rem;
      color: #2c2c2a;
    }
    .header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #72243E;
    }
    .header p {
      font-size: 12px;
      color: #993556;
      margin-top: 3px;
    }
    .dir-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 1.2rem;
      background: #f4c0d1;
      border-radius: 40px;
      padding: 4px;
    }
    .dir-tab {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      border-radius: 40px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #993556;
      font-weight: 400;
      transition: background .2s, color .2s;
    }
    .dir-tab.active {
      background: #fff;
      color: #D4537E;
      font-weight: 600;
      box-shadow: 0 1px 4px rgba(212,83,126,0.15);
    }
    .hero {
      background: #FBEAF0;
      border-radius: 24px;
      padding: 1.5rem 1rem 1.2rem;
      text-align: center;
      margin-bottom: 1rem;
      border: 1px solid #F4C0D1;
    }
    .hero-label {
      font-size: 13px;
      color: #993556;
      margin-bottom: .5rem;
    }
    .cd-wrap {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      margin-bottom: .5rem;
    }
    .cd-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .cd-num {
      font-size: 88px;
      font-weight: 700;
      line-height: 1;
      color: #72243E;
      font-variant-numeric: tabular-nums;
      letter-spacing: -3px;
    }
    .cd-unit {
      font-size: 15px;
      color: #993556;
      margin-top: 4px;
      font-weight: 600;
    }
    .cd-sep {
      font-size: 72px;
      font-weight: 700;
      color: #D4537E;
      line-height: 1;
      margin-bottom: 10px;
    }
    .pass-row {
      font-size: 13px;
      color: #993556;
      margin-bottom: 1rem;
    }
    .pass-time-big {
      font-size: 24px;
      font-weight: 700;
      color: #72243E;
    }
    .bar-wrap {
      background: #F4C0D1;
      border-radius: 6px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #F4C0D1, #D4537E);
      border-radius: 6px;
      transition: width 1s linear;
    }
    .track-wrap {
      position: relative;
      height: 40px;
    }
    .track-line {
      position: absolute;
      top: 50%;
      left: 10px;
      right: 10px;
      height: 3px;
      background: #F4C0D1;
      border-radius: 2px;
      transform: translateY(-50%);
    }
    .track-dot {
      position: absolute;
      top: 50%;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #D4537E;
      border: 2px solid #FBEAF0;
      transform: translate(-50%, -50%);
    }
    .track-train {
      position: absolute;
      top: 50%;
      font-size: 28px;
      transform: translateY(-50%);
      transition: left 1s linear;
    }
    .train-badge {
      display: inline-block;
      background: #FBEAF0;
      color: #72243E;
      border: 1px solid #F4C0D1;
      border-radius: 40px;
      padding: 5px 18px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 1.2rem;
      text-align: center;
    }
    .ref-note {
      font-size: 11px;
      color: #993556;
      margin-bottom: 6px;
      text-align: center;
    }
    .list-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 6px;
    }
    .list-card {
      background: #fff;
      border: 1px solid #F4C0D1;
      border-radius: 16px;
      overflow: hidden;
    }
    .list-row {
      display: flex;
      align-items: center;
      padding: 11px 14px;
      gap: 10px;
      border-bottom: 1px solid #fde8f0;
    }
    .list-row:last-child { border-bottom: none; }
    .list-row.now { background: #FBEAF0; }
    .lt {
      font-size: 15px;
      font-weight: 600;
      color: #2c2c2a;
      min-width: 46px;
    }
    .ln {
      font-size: 13px;
      color: #666;
      flex: 1;
    }
    .lp {
      font-size: 12px;
      color: #993556;
      min-width: 44px;
      text-align: right;
    }
    .badge-now {
      font-size: 10px;
      background: #D4537E;
      color: #fff;
      padding: 2px 9px;
      border-radius: 40px;
      font-weight: 600;
    }
    .source-note {
      font-size: 10px;
      color: #aaa;
      text-align: center;
      margin-top: 1.2rem;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🌸 上熊本 新幹線ウォッチャー</h1>
    <p>JR上熊本駅付近の通過時刻</p>
  </div>

  <div class="dir-tabs">
    <button class="dir-tab active" id="tabS" onclick="setDir('south')">▼ 下り（鹿児島方面）</button>
    <button class="dir-tab" id="tabN" onclick="setDir('north')">▲ 上り（博多方面）</button>
  </div>

  <div class="hero">
    <div class="hero-label">🌸 上熊本付近を通過するまで</div>
    <div class="cd-wrap">
      <div class="cd-block">
        <div class="cd-num" id="cdMin">--</div>
        <div class="cd-unit">分</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-block">
        <div class="cd-num" id="cdSec">--</div>
        <div class="cd-unit">秒</div>
      </div>
    </div>
    <div class="pass-row">
      通過予定時刻　<span class="pass-time-big" id="passTime">--:--</span>
    </div>
    <div class="bar-wrap"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
    <div class="track-wrap">
      <div class="track-line"></div>
      <div class="track-dot" style="left:10px"></div>
      <div class="track-dot" style="right:0;left:auto;transform:translate(0,-50%)"></div>
      <div class="track-train" id="trackTrain" style="left:4%">🚅</div>
    </div>
  </div>

  <div style="text-align:center;margin-bottom:1.2rem">
    <div class="train-badge" id="trainBadge">さくら号</div>
  </div>

  <div class="list-label">次の通過予定</div>
  <div class="ref-note" id="refNote"></div>
  <div class="list-card" id="listCard"></div>
  <div class="source-note">※ JR九州公式時刻表データ使用　下り＝熊本着−2分 / 上り＝熊本発＋2分</div>

  <script>
    const BASE_S = [
      {arr:"06:03",dep:"06:11",kn:"つばめ303号",d:"鹿児島中央",origin:true},
      {arr:"06:27",dep:"06:35",kn:"つばめ305号",d:"鹿児島中央",origin:true},
      {arr:"06:53",dep:"07:01",kn:"つばめ307号",d:"鹿児島中央",origin:false},
      {arr:"07:23",dep:"07:31",kn:"つばめ309号",d:"鹿児島中央",origin:true},
      {arr:"08:05",dep:"08:13",kn:"つばめ311号",d:"鹿児島中央",origin:true},
      {arr:"08:36",dep:"08:37",kn:"さくら401号",d:"鹿児島中央",origin:false},
      {arr:"09:02",dep:"09:03",kn:"みずほ601号",d:"鹿児島中央",origin:false},
      {arr:"09:18",dep:"09:19",kn:"さくら403号",d:"鹿児島中央",origin:false},
      {arr:"09:44",dep:"09:45",kn:"さくら541号",d:"鹿児島中央",origin:false},
      {arr:"10:06",dep:"10:07",kn:"さくら543号",d:"鹿児島中央",origin:false},
      {arr:"10:28",dep:"10:29",kn:"みずほ603号",d:"鹿児島中央",origin:false},
      {arr:"10:52",dep:"10:53",kn:"みずほ605号",d:"鹿児島中央",origin:false},
      {arr:"11:16",dep:"11:17",kn:"さくら545号",d:"鹿児島中央",origin:false},
      {arr:"12:06",dep:"12:07",kn:"さくら547号",d:"鹿児島中央",origin:false},
      {arr:"12:39",dep:"12:40",kn:"さくら549号",d:"鹿児島中央",origin:false},
      {arr:"12:59",dep:"13:00",kn:"みずほ607号",d:"鹿児島中央",origin:false},
      {arr:"13:40",dep:"13:41",kn:"さくら551号",d:"鹿児島中央",origin:false},
      {arr:"14:14",dep:"14:15",kn:"さくら405号",d:"鹿児島中央",origin:false},
      {arr:"14:39",dep:"14:40",kn:"さくら553号",d:"鹿児島中央",origin:false},
      {arr:"15:39",dep:"15:40",kn:"さくら555号",d:"鹿児島中央",origin:false},
      {arr:"16:14",dep:"16:15",kn:"さくら407号",d:"鹿児島中央",origin:false},
      {arr:"16:39",dep:"16:40",kn:"さくら557号",d:"鹿児島中央",origin:false},
      {arr:"17:14",dep:"17:15",kn:"さくら409号",d:"鹿児島中央",origin:false},
      {arr:"17:39",dep:"17:40",kn:"さくら559号",d:"鹿児島中央",origin:false},
      {arr:"18:14",dep:"18:15",kn:"さくら411号",d:"鹿児島中央",origin:false},
      {arr:"18:39",dep:"18:40",kn:"さくら561号",d:"鹿児島中央",origin:false},
      {arr:"18:59",dep:"19:00",kn:"みずほ609号",d:"鹿児島中央",origin:false},
      {arr:"19:42",dep:"19:43",kn:"さくら563号",d:"鹿児島中央",origin:false},
      {arr:"20:00",dep:"20:01",kn:"みずほ611号",d:"鹿児島中央",origin:false},
      {arr:"20:42",dep:"20:43",kn:"さくら565号",d:"鹿児島中央",origin:false},
      {arr:"21:03",dep:"21:04",kn:"さくら567号",d:"鹿児島中央",origin:false},
      {arr:"21:42",dep:"21:43",kn:"さくら569号",d:"鹿児島中央",origin:false},
      {arr:"22:00",dep:"22:01",kn:"みずほ613号",d:"鹿児島中央",origin:false},
      {arr:"22:39",dep:"22:40",kn:"さくら571号",d:"鹿児島中央",origin:false},
      {arr:"22:52",dep:"22:53",kn:"みずほ615号",d:"鹿児島中央",origin:false},
      {arr:"22:55",dep:"23:00",kn:"つばめ343号",d:"鹿児島中央",origin:true},
    ];
    const BASE_N = [
      {dep:"06:00",kn:"さくら460号",d:"博多"},
      {dep:"06:08",kn:"さくら740号",d:"新大阪"},
      {dep:"06:30",kn:"つばめ300号",d:"博多"},
      {dep:"07:02",kn:"さくら400号",d:"博多"},
      {dep:"07:07",kn:"つばめ302号",d:"小倉"},
      {dep:"07:19",kn:"みずほ600号",d:"新大阪"},
      {dep:"07:28",kn:"つばめ304号",d:"博多"},
      {dep:"07:42",kn:"さくら742号",d:"新大阪"},
      {dep:"07:45",kn:"つばめ306号",d:"博多"},
      {dep:"08:06",kn:"つばめ308号",d:"博多"},
      {dep:"08:19",kn:"みずほ602号",d:"新大阪"},
      {dep:"08:39",kn:"さくら744号",d:"新大阪"},
      {dep:"09:03",kn:"さくら788号",d:"新大阪"},
      {dep:"09:16",kn:"みずほ604号",d:"新大阪"},
      {dep:"09:20",kn:"つばめ310号",d:"博多"},
      {dep:"09:39",kn:"さくら746号",d:"新大阪"},
      {dep:"09:51",kn:"さくら464号",d:"博多"},
      {dep:"10:04",kn:"さくら748号",d:"新大阪"},
      {dep:"10:20",kn:"つばめ312号",d:"博多"},
      {dep:"10:39",kn:"さくら750号",d:"新大阪"},
      {dep:"11:00",kn:"さくら466号",d:"博多"},
      {dep:"11:16",kn:"みずほ606号",d:"新大阪"},
      {dep:"11:20",kn:"つばめ314号",d:"博多"},
      {dep:"11:42",kn:"さくら752号",d:"新大阪"},
      {dep:"12:17",kn:"さくら402号",d:"博多"},
      {dep:"12:20",kn:"つばめ316号",d:"博多"},
      {dep:"12:42",kn:"さくら754号",d:"新大阪"},
      {dep:"13:17",kn:"さくら404号",d:"博多"},
      {dep:"13:20",kn:"つばめ318号",d:"博多"},
      {dep:"13:42",kn:"さくら756号",d:"新大阪"},
      {dep:"14:07",kn:"つばめ320号",d:"博多"},
      {dep:"14:42",kn:"さくら758号",d:"新大阪"},
      {dep:"15:04",kn:"さくら760号",d:"新大阪"},
      {dep:"15:07",kn:"つばめ322号",d:"博多"},
      {dep:"15:42",kn:"さくら762号",d:"新大阪"},
      {dep:"15:50",kn:"つばめ324号",d:"博多"},
      {dep:"16:04",kn:"さくら764号",d:"新大阪"},
      {dep:"16:20",kn:"つばめ326号",d:"博多"},
      {dep:"16:42",kn:"さくら766号",d:"新大阪"},
      {dep:"17:04",kn:"さくら768号",d:"新大阪"},
      {dep:"17:20",kn:"つばめ328号",d:"博多"},
      {dep:"17:47",kn:"みずほ608号",d:"新大阪"},
      {dep:"18:04",kn:"さくら770号",d:"新大阪"},
      {dep:"18:20",kn:"つばめ330号",d:"博多"},
      {dep:"18:41",kn:"みずほ610号",d:"新大阪"},
      {dep:"19:02",kn:"さくら406号",d:"博多"},
      {dep:"19:13",kn:"みずほ612号",d:"新大阪"},
      {dep:"19:20",kn:"つばめ332号",d:"博多"},
      {dep:"19:38",kn:"さくら772号",d:"新大阪"},
      {dep:"19:56",kn:"つばめ334号",d:"博多"},
      {dep:"20:35",kn:"みずほ614号",d:"新大阪"},
      {dep:"20:38",kn:"つばめ336号",d:"博多"},
      {dep:"21:11",kn:"さくら408号",d:"広島"},
      {dep:"21:56",kn:"つばめ338号",d:"博多"},
      {dep:"22:34",kn:"つばめ340号",d:"博多"},
      {dep:"23:16",kn:"さくら410号",d:"博多"},
    ];

    let dir = 'south';
    function toMin(t){const[h,m]=t.split(':').map(Number);return h*60+m}
    function addMin(t,d){const m=toMin(t)+d;const h=Math.floor(m/60)%24;return String(h).padStart(2,'0')+':'+String(m%60).padStart(2,'0')}
    function nowSec(){const n=new Date();return n.getHours()*3600+n.getMinutes()*60+n.getSeconds()}

    function getTT(){
      if(dir==='south'){
        return BASE_S.map(r=>{
          const base = r.origin ? r.dep : r.arr;
          return {...r, passTime:addMin(base,-2), baseTime:base};
        });
      } else {
        return BASE_N.map(r=>({...r, passTime:addMin(r.dep,2), baseTime:r.dep}));
      }
    }
    function findNext(tt){
      const ns=nowSec();
      for(let i=0;i<tt.length;i++){if(toMin(tt[i].passTime)*60>ns)return i;}
      return 0;
    }
    function setDir(d){
      dir=d;
      document.getElementById('tabS').classList.toggle('active',d==='south');
      document.getElementById('tabN').classList.toggle('active',d==='north');
      update();
    }
    function update(){
      const tt=getTT();
      const idx=findNext(tt);
      const next=tt[idx];
      const ns=nowSec();
      let diff=toMin(next.passTime)*60-ns;
      if(diff<0)diff+=86400;
      const mm=Math.floor(diff/60);
      const ss=diff%60;

      document.getElementById('cdMin').textContent=String(mm).padStart(2,'0');
      document.getElementById('cdSec').textContent=String(ss).padStart(2,'0');
      document.getElementById('passTime').textContent=next.passTime;
      document.getElementById('trainBadge').textContent=next.kn+' → '+next.d;

      if(dir==='south'){
        const label = next.origin ? '熊本始発 発'+next.dep+' − 2分' : '熊本着'+next.arr+' − 2分';
        document.getElementById('refNote').textContent='算出根拠：'+label;
      } else {
        document.getElementById('refNote').textContent='算出根拠：熊本発'+next.dep+' ＋ 2分';
      }

      const prevIdx=(idx-1+tt.length)%tt.length;
      const prevSec=toMin(tt[prevIdx].passTime)*60;
      const nextSec=toMin(next.passTime)*60;
      let totalGap=nextSec-prevSec;
      if(totalGap<=0)totalGap+=86400;
      let elapsed=ns-prevSec;
      if(elapsed<0)elapsed+=86400;
      const pct=Math.min(100,Math.max(0,(elapsed/totalGap)*100));

      document.getElementById('barFill').style.width=pct+'%';
      const train=document.getElementById('trackTrain');
      const pos=dir==='south'?pct:(100-pct);
      train.style.left=Math.min(88,Math.max(2,pos))+'%';
      train.textContent=dir==='south'?'🚅':'🚄';

      const upcoming=[];
      for(let i=0;i<tt.length&&upcoming.length<5;i++){
        const j=(idx+i)%tt.length;
        upcoming.push({...tt[j],isNext:i===0});
      }
      document.getElementById('listCard').innerHTML=upcoming.map(r=>`
        <div class="list-row${r.isNext?' now':''}">
          <span class="lt">${r.passTime}</span>
          <span class="ln">${r.kn}</span>
          <span class="lp">${r.d}</span>
          ${r.isNext?'<span class="badge-now">次</span>':''}
        </div>
      `).join('');
    }
    update();
    setInterval(update,1000);
  </script>
</body>
</html>
